name: Test & Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Generate coverage report
        run: npm run test:coverage -- --run
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  e2e-tests:
    name: E2E Tests (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Start web server
        run: |
          cd ${{ github.workspace }}
          echo "Working directory: $(pwd)"
          echo "Files: $(ls -la | head -20)"

          python -m http.server 3000 > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000/desktop.html > /dev/null; then
              echo "✅ Server is ready"
              cat /tmp/server.log
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
            if [ $i -eq 30 ]; then
              echo "❌ Server failed to start"
              cat /tmp/server.log
              exit 1
            fi
          done
        timeout-minutes: 2

      - name: Run E2E tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        timeout-minutes: 10
        env:
          CI: true
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, e2e-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          LINT="${{ needs.lint.result }}"
          UNIT="${{ needs.unit-tests.result }}"
          E2E="${{ needs.e2e-tests.result }}"

          FAILED=0

          if [ "$LINT" = "failure" ]; then
            echo "❌ Linting failed"
            FAILED=1
          fi

          if [ "$UNIT" = "failure" ]; then
            echo "❌ Unit tests failed"
            FAILED=1
          fi

          if [ "$E2E" = "failure" ] || [ "$E2E" = "cancelled" ]; then
            echo "⚠️  E2E tests failed or timed out (local setup required)"
          fi

          if [ $FAILED -eq 1 ]; then
            echo "❌ Critical tests failed!"
            exit 1
          fi

          echo "✅ Core tests passed! (Unit tests + Linting)"

  pr-comment:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, e2e-tests]
    if: github.event_name == 'pull_request' && always()
    permissions:
      pull-requests: write
    steps:
      - name: PR Status Comment
        uses: actions/github-script@v7
        with:
          script: |
            const lint = '${{ needs.lint.result }}' === 'success' ? '✅' : '❌';
            const unit = '${{ needs.unit-tests.result }}' === 'success' ? '✅' : '❌';
            const e2e = '${{ needs.e2e-tests.result }}';
            const e2eIcon = e2e === 'success' ? '✅' : (e2e === 'cancelled' || e2e === 'failure' ? '⚠️' : '🔄');

            const comment = `## Test Results

            | Check | Status |
            |-------|--------|
            | Linting | ${lint} |
            | Unit Tests | ${unit} |
            | E2E Tests | ${e2eIcon} |

            **Status:** ${lint === '✅' && unit === '✅' ? '✅ Ready to merge' : '❌ Fix issues to proceed'}

            *E2E tests require local setup. Run \`npm run test:e2e\` locally with web server.*

            [View workflow logs](${context.payload.pull_request.html_url}/checks)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
