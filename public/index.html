<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows 12 Online - Boot Sequence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            border: 0;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
        }

        #bootFrame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="bootFrame" src="boot.html"></iframe>

    <script>
        // Boot sequence: Show boot.html for ~5 seconds, then redirect to login
        // Windows 12 boot animation simulates startup before the login screen

        // Check if already logged in - if so, skip to desktop
        if (localStorage.getItem('win12_logged_in') === 'true') {
            // Already logged in, go straight to desktop
            setTimeout(() => {
                console.log('Boot sequence complete, resuming session...');
                window.location.href = 'desktop.html';
            }, 3000); // Shorter boot animation for returning users
        } else {
            // First time, show login after boot
            setTimeout(() => {
                console.log('Boot sequence complete, loading login screen...');
                window.location.href = 'login.html';
            }, 5000); // Full 5 second boot animation
        }
    </script>
</body>
</html>
